kind = "web"
previewPath = "/"
title = "App"
version = "1.0.0"
id = "artifacts/app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23863

[services.development]
run = "pnpm --filter @workspace/app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app", "run", "build" ]
serve = "static"
publicDir = "artifacts/app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23863"
BASE_PATH = "/"
